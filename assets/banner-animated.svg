<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <style>
      @keyframes float1 { 0%,100% { transform: translate(0,0) rotate(0deg); } 33% { transform: translate(12px,-18px) rotate(120deg); } 66% { transform: translate(-8px,-8px) rotate(240deg); } }
      @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-16px,-22px) scale(1.1); } }
      @keyframes float3 { 0%,100% { transform: translate(0,0); } 33% { transform: translate(20px,-12px); } 66% { transform: translate(-12px,-20px); } }
      @keyframes float4 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(8px,-28px) rotate(180deg); } }
      @keyframes float5 { 0%,100% { transform: translate(0,0) scale(1); opacity: 0.3; } 50% { transform: translate(-20px,-15px) scale(1.3); opacity: 0.7; } }
      @keyframes gridX { 0% { transform: translateX(0); } 100% { transform: translateX(60px); } }
      @keyframes gridY { 0% { transform: translateY(0); } 100% { transform: translateY(60px); } }
      @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(400%); } }
      @keyframes titleGlow { 0%,100% { filter: drop-shadow(0 0 8px #00D4FF) drop-shadow(0 0 20px rgba(0,212,255,0.3)); } 50% { filter: drop-shadow(0 0 20px #00D4FF) drop-shadow(0 0 50px rgba(0,212,255,0.5)); } }
      @keyframes subtitleFade { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
      @keyframes orbPulse { 0%,100% { r: 2; opacity: 0.2; } 50% { r: 4; opacity: 0.8; } }
      @keyframes lineDash { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
      @keyframes neonFlicker { 0%,100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.3; } 94% { opacity: 1; } 96% { opacity: 0.2; } 97% { opacity: 1; } }
      @keyframes rotateSlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .particle { animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      .grid-line-h { animation: gridX 4s linear infinite; }
      .grid-line-v { animation: gridY 4s linear infinite; }
      .float1 { animation: float1 8s ease-in-out infinite; }
      .float2 { animation: float2 6s ease-in-out infinite; }
      .float3 { animation: float3 10s ease-in-out infinite; }
      .float4 { animation: float4 7s ease-in-out infinite; }
      .float5 { animation: float5 9s ease-in-out infinite; }
      .title-glow { animation: titleGlow 3s ease-in-out infinite; }
      .subtitle { animation: subtitleFade 4s ease-in-out infinite; }
      .scanline { animation: scanline 8s linear infinite; }
      .orbit { animation: rotateSlow 20s linear infinite; transform-origin: 600px 200px; }
      .orbit-r { animation: rotateSlow 25s linear infinite reverse; transform-origin: 600px 200px; }
      .line-dash { stroke-dasharray: 200; animation: lineDash 3s ease-out infinite; }
    </style>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F1420"/>
      <stop offset="60%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowHeavy">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <clipPath id="rounded"><rect width="1200" height="400" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bg)"/>

    <!-- Noise overlay -->
    <rect width="1200" height="400" fill="url(#bg)" filter="url(#noise)" opacity="0.5"/>

    <!-- Scan line -->
    <rect class="scanline" width="1200" height="80" fill="url(#glowCyan)" opacity="0.03"/>

    <!-- Large ambient glow orbs -->
    <circle cx="200" cy="100" r="180" fill="url(#glowPurple)"/>
    <circle cx="1000" cy="300" r="150" fill="url(#glowCyan)"/>
    <circle cx="600" cy="350" r="120" fill="url(#glowGreen)"/>

    <!-- Grid -->
    <g opacity="0.08">
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00D4FF" stroke-width="0.5"/>
      </pattern>
      <rect width="1200" height="400" fill="url(#grid)">
        <animate attributeName="x" from="0" to="60" dur="4s" repeatCount="indefinite"/>
      </rect>
      <pattern id="gridAccent" width="180" height="180" patternUnits="userSpaceOnUse">
        <path d="M 180 0 L 0 0 0 180" fill="none" stroke="#8B5CF6" stroke-width="0.3"/>
      </pattern>
      <rect width="1200" height="400" fill="url(#gridAccent)"/>
    </g>

    <!-- Orbit ring -->
    <ellipse class="orbit" cx="600" cy="200" rx="350" ry="120" fill="none" stroke="#00D4FF" stroke-width="0.4" opacity="0.08"/>
    <ellipse class="orbit-r" cx="600" cy="200" rx="320" ry="100" fill="none" stroke="#8B5CF6" stroke-width="0.3" opacity="0.06"/>

    <!-- Orbital particles -->
    <circle class="orbit" cx="600" cy="200" r="3" fill="#00D4FF" filter="url(#glow)" opacity="0.6">
      <animateMotion dur="20s" repeatCount="indefinite" path="M-350,0 A350,120 0 1,1 350,0 A350,120 0 1,1 -350,0"/>
    </circle>
    <circle class="orbit-r" cx="600" cy="200" r="2" fill="#8B5CF6" filter="url(#glow)" opacity="0.4">
      <animateMotion dur="25s" repeatCount="indefinite" path="M-320,0 A320,100 0 1,0 320,0 A320,100 0 1,0 -320,0"/>
    </circle>
    <circle class="orbit" cx="600" cy="200" r="2" fill="#10B981" filter="url(#glow)" opacity="0.3">
      <animateMotion dur="16s" repeatCount="indefinite" path="M-280,0 A280,80 0 1,1 280,0 A280,80 0 1,1 -280,0"/>
    </circle>

    <!-- Floating particles -->
    <g class="particle float1"><circle cx="150" cy="320" r="2" fill="#00D4FF" filter="url(#glow)" opacity="0.6"/></g>
    <g class="particle float2"><circle cx="300" cy="280" r="1.5" fill="#8B5CF6" filter="url(#glow)" opacity="0.5"/></g>
    <g class="particle float3"><circle cx="450" cy="350" r="2.5" fill="#00D4FF" filter="url(#glow)" opacity="0.4"/></g>
    <g class="particle float4"><circle cx="700" cy="300" r="1.5" fill="#10B981" filter="url(#glow)" opacity="0.5"/></g>
    <g class="particle float5"><circle cx="850" cy="340" r="2" fill="#8B5CF6" filter="url(#glow)" opacity="0.3"/></g>
    <g class="particle float1"><circle cx="950" cy="260" r="1.5" fill="#00D4FF" filter="url(#glow)" opacity="0.5"/></g>
    <g class="particle float2"><circle cx="1050" cy="350" r="2" fill="#8B5CF6" filter="url(#glow)" opacity="0.4"/></g>
    <g class="particle float3"><circle cx="100" cy="200" r="1" fill="#00D4FF" opacity="0.4"/></g>
    <g class="particle float4"><circle cx="550" cy="350" r="1.5" fill="#10B981" opacity="0.3"/></g>
    <g class="particle float5"><circle cx="1100" cy="200" r="1" fill="#00D4FF" opacity="0.4"/></g>

    <!-- Small floating dots (higher count) -->
    <g class="particle float1" opacity="0.2"><circle cx="200" cy="150" r="1" fill="#fff"/></g>
    <g class="particle float2" opacity="0.2"><circle cx="400" cy="180" r="1" fill="#fff"/></g>
    <g class="particle float3" opacity="0.2"><circle cx="600" cy="120" r="1" fill="#fff"/></g>
    <g class="particle float4" opacity="0.2"><circle cx="800" cy="160" r="1" fill="#fff"/></g>
    <g class="particle float5" opacity="0.2"><circle cx="1000" cy="140" r="1" fill="#fff"/></g>

    <!-- Geometric corner accents -->
    <g opacity="0.15">
      <path d="M 30 30 L 30 80 M 30 30 L 80 30" stroke="#00D4FF" stroke-width="1.5" fill="none">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M 1170 30 L 1170 80 M 1170 30 L 1120 30" stroke="#8B5CF6" stroke-width="1.5" fill="none">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" begin="1s" repeatCount="indefinite"/>
      </path>
      <path d="M 30 370 L 30 320 M 30 370 L 80 370" stroke="#10B981" stroke-width="1.5" fill="none">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" begin="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 1170 370 L 1170 320 M 1170 370 L 1120 370" stroke="#00D4FF" stroke-width="1.5" fill="none">
        <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" begin="3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Decorative line art -->
    <g opacity="0.06">
      <path class="line-dash" d="M 400 380 L 800 380" stroke="#00D4FF" stroke-width="1"/>
      <path class="line-dash" d="M 350 390 L 850 390" stroke="#8B5CF6" stroke-width="0.5" animation-delay="1s"/>
    </g>

    <!-- Center content -->
    <g transform="translate(600, 185)">
      <!-- Name -->
      <text class="title-glow" text-anchor="middle" fill="url(#textGrad)" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="64" font-weight="700" letter-spacing="4" y="0">
        Karan Saun
      </text>

      <!-- Title line accent -->
      <rect x="-80" y="12" width="160" height="1.5" fill="#00D4FF" opacity="0.4" rx="1">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
      </rect>

      <!-- Tagline -->
      <text class="subtitle" text-anchor="middle" fill="#94A3B8" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="18" font-weight="400" letter-spacing="6" y="45" text-transform="uppercase">
        AI Systems Engineer
      </text>
      
      <!-- Subtle tagline under glow -->
      <text text-anchor="middle" fill="#00D4FF" font-family="'Inter','SF Pro Display',-apple-system,sans-serif" font-size="11" font-weight="300" letter-spacing="8" y="68" opacity="0.3">
        PRODUCTION INTELLIGENCE
      </text>
    </g>

    <!-- Bottom bar -->
    <g opacity="0.08">
      <rect x="0" y="392" width="1200" height="1" fill="url(#textGrad)"/>
    </g>
  </g>
</svg>
