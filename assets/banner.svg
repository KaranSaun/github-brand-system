<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080d"/>
      <stop offset="50%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="line2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(148,163,184,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <!-- Glow orbs -->
  <circle cx="200" cy="200" r="300" fill="url(#cyanGlow)"/>
  <circle cx="1000" cy="200" r="300" fill="url(#purpleGlow)"/>
  <!-- Decorative lines -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="url(#line1)" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="url(#line2)" stroke-width="1" opacity="0.3"/>
  <!-- Grid dots -->
  <g fill="#00d4ff" opacity="0.15">
    <circle cx="100" cy="60" r="2"/>
    <circle cx="1100" cy="340" r="2"/>
    <circle cx="300" cy="100" r="1.5"/>
    <circle cx="900" cy="300" r="1.5"/>
  </g>
  <!-- Code decoration -->
  <g opacity="0.08" font-family="JetBrains Mono, monospace" font-size="11" fill="#00d4ff">
    <text x="40" y="200">def build_intelligence():</text>
    <text x="60" y="220">stack = ["FastAPI", "Next.js", "Docker"]</text>
    <text x="60" y="240">return ProductionSystem(stack)</text>
  </g>
  <!-- Main content -->
  <g transform="translate(600, 195)">
    <text text-anchor="middle" fill="url(#textGrad)" font-family="Inter, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">Karan Saun</text>
    <text text-anchor="middle" y="42" fill="#64748b" font-family="Inter, sans-serif" font-size="18" font-weight="400" letter-spacing="2">AI SYSTEMS ENGINEER</text>
    <!-- Accent bar under name -->
    <rect x="-60" y="60" width="120" height="2" rx="1" fill="#00d4ff" filter="url(#glow)"/>
    <text text-anchor="middle" y="95" fill="#94a3b8" font-family="Inter, sans-serif" font-size="14">production intelligence for real-world systems</text>
  </g>
</svg>
