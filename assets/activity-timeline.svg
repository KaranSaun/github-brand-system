<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <style>
      @keyframes rise1 { 0% { transform: scaleY(0.2); opacity: 0.3; } 50% { transform: scaleY(1); opacity: 1; } 100% { transform: scaleY(0.2); opacity: 0.3; } }
      @keyframes rise2 { 0% { transform: scaleY(0.3); opacity: 0.3; } 50% { transform: scaleY(0.9); opacity: 1; } 100% { transform: scaleY(0.3); opacity: 0.3; } }
      @keyframes rise3 { 0% { transform: scaleY(0.1); opacity: 0.2; } 50% { transform: scaleY(1.1); opacity: 1; } 100% { transform: scaleY(0.1); opacity: 0.2; } }
      @keyframes rise4 { 0% { transform: scaleY(0.4); opacity: 0.4; } 50% { transform: scaleY(0.85); opacity: 1; } 100% { transform: scaleY(0.4); opacity: 0.4; } }
      @keyframes barGlow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      .bar1 { animation: rise1 6s ease-in-out infinite; transform-origin: bottom; }
      .bar2 { animation: rise2 7s ease-in-out infinite; transform-origin: bottom; }
      .bar3 { animation: rise3 5s ease-in-out infinite; transform-origin: bottom; }
      .bar4 { animation: rise4 8s ease-in-out infinite; transform-origin: bottom; }
      .bar-glow { animation: barGlow 3s ease-in-out infinite; }
    </style>
    <linearGradient id="barAI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="barBE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="barFE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="barInf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="barGlowF"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="1200" height="320" fill="#0A0E17"/>

  <text x="600" y="28" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="10" letter-spacing="4" opacity="0.4">ACTIVITY BREAKDOWN · PROJECT FOCUS BY DOMAIN</text>

  <!-- Legend -->
  <g transform="translate(320, 42)">
    <rect x="0" y="0" width="10" height="10" rx="2" fill="#8B5CF6"/>
    <text x="16" y="9" fill="#64748B" font-family="'Inter',sans-serif" font-size="9">AI/ML</text>
    <rect x="70" y="0" width="10" height="10" rx="2" fill="#00D4FF"/>
    <text x="86" y="9" fill="#64748B" font-family="'Inter',sans-serif" font-size="9">Backend</text>
    <rect x="150" y="0" width="10" height="10" rx="2" fill="#10B981"/>
    <text x="166" y="9" fill="#64748B" font-family="'Inter',sans-serif" font-size="9">Frontend</text>
    <rect x="240" y="0" width="10" height="10" rx="2" fill="#F59E0B"/>
    <text x="256" y="9" fill="#64748B" font-family="'Inter',sans-serif" font-size="9">Infrastructure</text>
  </g>

  <!-- Chart area -->
  <g transform="translate(60, 60)">
    <!-- Y-axis labels -->
    <text x="0" y="10" fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="end">100%</text>
    <text x="0" y="60" fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="end">75%</text>
    <text x="0" y="110" fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="end">50%</text>
    <text x="0" y="160" fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="end">25%</text>
    <text x="0" y="210" fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="end">0%</text>

    <!-- Grid lines -->
    <g stroke="#1E293B" stroke-width="0.5" opacity="0.5">
      <line x1="10" y1="10" x2="1080" y2="10"/>
      <line x1="10" y1="60" x2="1080" y2="60"/>
      <line x1="10" y1="110" x2="1080" y2="110"/>
      <line x1="10" y1="160" x2="1080" y2="160"/>
      <line x1="10" y1="210" x2="1080" y2="210"/>
    </g>

    <!-- X-axis labels (projects) -->
    <g fill="#475569" font-family="'Inter',sans-serif" font-size="8" text-anchor="middle">
      <text x="70" y="235">NEXUS</text>
      <text x="210" y="235">TexLayer</text>
      <text x="350" y="235">APEX OS</text>
      <text x="490" y="235">Sentiy</text>
      <text x="630" y="235">Recon.</text>
      <text x="770" y="235">Alpha</text>
      <text x="910" y="235">Brand</text>
      <text x="1050" y="235">Profile</text>
    </g>

    <!-- Project bars (stacked: AI + BE + FE + Infra) -->
    <!-- NEXUS -->
    <g transform="translate(35, 0)">
      <rect class="bar4" x="0" y="15" width="70" height="85" rx="3" fill="url(#barInf)" opacity="0.3"/>
      <rect class="bar3" x="0" y="10" width="70" height="80" rx="3" fill="url(#barFE)" opacity="0.3"/>
      <rect class="bar2" x="0" y="50" width="70" height="120" rx="3" fill="url(#barBE)"/>
      <rect class="bar1" x="0" y="95" width="70" height="110" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">45%</text>
    </g>

    <!-- TexLayerAI -->
    <g transform="translate(175, 0)">
      <rect class="bar3" x="0" y="25" width="70" height="60" rx="3" fill="url(#barFE)" opacity="0.3"/>
      <rect class="bar2" x="0" y="15" width="70" height="70" rx="3" fill="url(#barBE)"/>
      <rect class="bar1" x="0" y="30" width="70" height="145" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">40%</text>
    </g>

    <!-- APEX OS -->
    <g transform="translate(315, 0)">
      <rect class="bar4" x="0" y="25" width="70" height="60" rx="3" fill="url(#barInf)" opacity="0.3"/>
      <rect class="bar3" x="0" y="15" width="70" height="90" rx="3" fill="url(#barFE)"/>
      <rect class="bar2" x="0" y="20" width="70" height="110" rx="3" fill="url(#barBE)"/>
      <rect class="bar1" x="0" y="55" width="70" height="95" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">35%</text>
    </g>

    <!-- Sentiy -->
    <g transform="translate(455, 0)">
      <rect class="bar3" x="0" y="50" width="70" height="30" rx="3" fill="url(#barFE)" opacity="0.3"/>
      <rect class="bar2" x="0" y="25" width="70" height="55" rx="3" fill="url(#barBE)"/>
      <rect class="bar1" x="0" y="15" width="70" height="160" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">50%</text>
    </g>

    <!-- Recon Engine -->
    <g transform="translate(595, 0)">
      <rect class="bar2" x="0" y="5" width="70" height="100" rx="3" fill="url(#barBE)"/>
      <rect class="bar1" x="0" y="60" width="70" height="45" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">25%</text>
    </g>

    <!-- AlphaPulse -->
    <g transform="translate(735, 0)">
      <rect class="bar1" x="0" y="10" width="70" height="165" rx="3" fill="url(#barAI)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">55%</text>
    </g>

    <!-- Brand System -->
    <g transform="translate(875, 0)">
      <rect class="bar3" x="0" y="15" width="70" height="100" rx="3" fill="url(#barFE)"/>
      <rect class="bar2" x="0" y="55" width="70" height="60" rx="3" fill="url(#barBE)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">20%</text>
    </g>

    <!-- Profile -->
    <g transform="translate(1015, 0)">
      <rect class="bar3" x="0" y="80" width="70" height="40" rx="3" fill="url(#barFE)"/>
      <rect class="bar2" x="0" y="20" width="70" height="100" rx="3" fill="url(#barBE)"/>
      <text x="35" y="205" text-anchor="middle" fill="#64748B" font-family="'Inter',sans-serif" font-size="7" opacity="0.5">15%</text>
    </g>
  </g>

  <!-- Bottom insight text -->
  <text x="600" y="300" text-anchor="middle" fill="#475569" font-family="'Inter',sans-serif" font-size="8" letter-spacing="2" opacity="0.4">MOST AI-INTENSIVE: ALPHAPULSE · MOST FULL-STACK: NEXUS · MOST DIVERSE: APEX OS</text>

  <!-- Animated scanline overlay -->
  <rect class="bar-glow" x="0" y="40" width="1200" height="1" fill="#00D4FF" opacity="0.08"/>
</svg>
