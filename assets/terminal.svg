<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#151c2c"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(139,92,246,0.2)"/>
    </linearGradient>
  </defs>
  <!-- Terminal window -->
  <rect x="20" y="20" width="360" height="160" rx="10" fill="url(#termBg)" stroke="url(#termBorder)" stroke-width="1"/>
  <!-- Title bar dots -->
  <circle cx="42" cy="40" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="62" cy="40" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="82" cy="40" r="5" fill="#10b981" opacity="0.8"/>
  <!-- Title text -->
  <text x="200" y="45" text-anchor="middle" fill="#64748b" font-family="Inter, sans-serif" font-size="11" font-weight="500">bash — karan</text>
  <!-- Terminal content -->
  <text x="40" y="80" fill="#10b981" font-family="JetBrains Mono, monospace" font-size="12">$</text>
  <text x="55" y="80" fill="#f0f4f8" font-family="JetBrains Mono, monospace" font-size="12">./build --stack production-ai</text>
  <text x="40" y="105" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="11">[FastAPI]   ✓ Server ready on :8000</text>
  <text x="40" y="125" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="11">[Next.js]   ✓ Dashboard ready on :3000</text>
  <text x="40" y="145" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="11">[Docker]    ✓ Stack deployed (12s)</text>
  <text x="40" y="168" fill="#00d4ff" font-family="JetBrains Mono, monospace" font-size="12">System.Intelligence → READY</text>
</svg>
